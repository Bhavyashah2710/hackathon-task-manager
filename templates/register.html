<!DOCTYPE html>
<html><head><title>Register</title>
<style>
    body { font-family: Arial, sans-serif; background-color: #2ecc71; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); width: 300px; text-align: center; }
    input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 10px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    a { color: #2ecc71; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
</style></head>
<body>
    <div class="card">
        <h2>Register Member</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit">Register</button>
        </form>
        <a href="/">← Back to Home</a>
    </div>
</body></html>
